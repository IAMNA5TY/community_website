<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cam Smoke — Animated</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    .stage {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .smoke {
      position: absolute;
      background-repeat: repeat;
      background-size: 640px 360px;
      opacity: 0;
      mix-blend-mode: screen;
      will-change: transform, opacity, background-position;
      filter: blur(0.4px);
    }
    .smoke-a {
      animation:
        driftA 14s linear infinite,
        breathe 5.5s ease-in-out infinite;
    }
    .smoke-b {
      animation:
        driftB 19s linear infinite,
        breathe 7s ease-in-out infinite reverse;
    }
    .smoke-c {
      animation:
        driftC 11s linear infinite,
        breathe 4.2s ease-in-out infinite;
    }
    @keyframes driftA {
      from { background-position: 0 0; }
      to   { background-position: -640px -180px; }
    }
    @keyframes driftB {
      from { background-position: 0 0; }
      to   { background-position: 640px -240px; }
    }
    @keyframes driftC {
      from { background-position: 0 0; }
      to   { background-position: -320px 200px; }
    }
    @keyframes breathe {
      0%, 100% { opacity: var(--a0, 0.45); }
      50%      { opacity: var(--a1, 0.7); }
    }
    .stack {
      position: absolute;
      inset: 0;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="stack" id="stack">
      <!-- Edge bands only — webcam sits on top so face stays clear -->
      <div class="smoke smoke-a" id="sA"></div>
      <div class="smoke smoke-b" id="sB"></div>
      <div class="smoke smoke-c" id="sC"></div>
    </div>
  </div>
  <script>
    /**
     * Animated CSS smoke using looping photographic texture.
     * Layers: Brick → Drop shadow → THIS → Webcam
     *
     * /widgets/cam-smoke.html?obs=1&v=8
     * ?x=480&y=250&w=960&h=540&intensity=1.2
     */
    const params = new URLSearchParams(location.search);
    const BASE_W = 1920;
    const BASE_H = 1080;
    const cam = {
      x: num(params.get("x"), 480),
      y: num(params.get("y"), 250),
      w: num(params.get("w"), 960),
      h: num(params.get("h"), 540),
    };
    const intensity = clamp(num(params.get("intensity"), 1.2), 0.4, 2.5);
    const TEX = "/widgets/smoke/smoke-loop.webp?v=8";

    function num(v, fallback) {
      if (v == null || v === "") return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    const sA = document.getElementById("sA");
    const sB = document.getElementById("sB");
    const sC = document.getElementById("sC");

    for (const el of [sA, sB, sC]) {
      el.style.backgroundImage = `url("${TEX}")`;
    }

    function layout() {
      const sw = window.innerWidth || BASE_W;
      const sh = window.innerHeight || BASE_H;
      const sx = sw / BASE_W;
      const sy = sh / BASE_H;
      const r = {
        x: cam.x * sx,
        y: cam.y * sy,
        w: cam.w * sx,
        h: cam.h * sy,
      };

      // Right lip — flowing vertical smoke (mostly outside cam)
      Object.assign(sA.style, {
        left: `${r.x + r.w - r.w * 0.06}px`,
        top: `${r.y - r.h * 0.02}px`,
        width: `${r.w * 0.42}px`,
        height: `${r.h * 1.1}px`,
        "--a0": String(0.42 * intensity),
        "--a1": String(0.78 * intensity),
        borderRadius: "35% 40% 45% 30%",
      });

      // Bottom lip — rolling under the cam edge
      Object.assign(sB.style, {
        left: `${r.x - r.w * 0.02}px`,
        top: `${r.y + r.h - r.h * 0.12}px`,
        width: `${r.w * 1.15}px`,
        height: `${r.h * 0.42}px`,
        "--a0": String(0.38 * intensity),
        "--a1": String(0.7 * intensity),
        borderRadius: "40%",
      });

      // Left accent drift
      Object.assign(sC.style, {
        left: `${r.x - r.w * 0.22}px`,
        top: `${r.y + r.h * 0.2}px`,
        width: `${r.w * 0.28}px`,
        height: `${r.h * 0.7}px`,
        "--a0": String(0.24 * intensity),
        "--a1": String(0.5 * intensity),
        borderRadius: "45%",
      });
    }

    window.addEventListener("resize", layout);
    layout();

    // Fallback if WebP animation unsupported — still show scrolling plates
    const test = new Image();
    test.src = TEX;
    test.onerror = () => {
      const fallback = "/widgets/smoke/plate-a.png?v=8";
      for (const el of [sA, sB, sC]) el.style.backgroundImage = `url("${fallback}")`;
    };
  </script>
</body>
</html>
