<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cam Mist</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    /**
     * Soft animated edge mist — between drop shadow and webcam.
     * Layers (bottom → top): Brick → Drop shadow → THIS → Webcam
     *
     * https://na5ty.com/widgets/cam-smoke.html?obs=1&v=9
     * ?x=480&y=250&w=960&h=540&intensity=1
     */
    const params = new URLSearchParams(location.search);
    const BASE_W = 1920;
    const BASE_H = 1080;

    const cam = {
      x: num(params.get("x"), 480),
      y: num(params.get("y"), 250),
      w: num(params.get("w"), 960),
      h: num(params.get("h"), 540),
    };
    const intensity = clamp(num(params.get("intensity"), 1), 0.4, 2);

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });

    let cssW = BASE_W;
    let cssH = BASE_H;
    let particles = [];
    let t = 0;

    function num(v, fallback) {
      if (v == null || v === "") return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }
    function rand(a, b) {
      return a + Math.random() * (b - a);
    }

    function resize() {
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      cssW = iw >= 2 ? iw : BASE_W;
      cssH = ih >= 2 ? ih : BASE_H;
      if (Math.abs(cssW - BASE_W) < 8 && Math.abs(cssH - BASE_H) < 8) {
        cssW = BASE_W;
        cssH = BASE_H;
      }
      canvas.width = cssW;
      canvas.height = cssH;
    }

    function scaleRect() {
      const sx = cssW / BASE_W;
      const sy = cssH / BASE_H;
      return {
        x: cam.x * sx,
        y: cam.y * sy,
        w: cam.w * sx,
        h: cam.h * sy,
      };
    }

    function roundFill(x, y, w, h, rad) {
      const rr = Math.min(rad, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
      ctx.fill();
    }

    /** Spawn only in the shadow lip: right + bottom (+ light left). */
    function spawn(r) {
      const lip = Math.max(48, r.w * 0.08);
      const roll = Math.random();
      let x;
      let y;

      if (roll < 0.5) {
        // right of cam
        x = rand(r.x + r.w - 4, r.x + r.w + lip * 1.35);
        y = rand(r.y + r.h * 0.1, r.y + r.h + lip * 0.4);
      } else if (roll < 0.88) {
        // under cam
        x = rand(r.x + r.w * 0.05, r.x + r.w + lip * 0.3);
        y = rand(r.y + r.h - 6, r.y + r.h + lip * 1.1);
      } else {
        // left accent
        x = rand(r.x - lip, r.x + 4);
        y = rand(r.y + r.h * 0.25, r.y + r.h + lip * 0.3);
      }

      const size = rand(14, 38) * (0.85 + intensity * 0.25);
      return {
        x,
        y,
        size,
        baseSize: size,
        vx: rand(-0.08, 0.14),
        vy: rand(-0.42, -0.12),
        life: 0,
        maxLife: rand(2.8, 5.5),
        wobble: rand(0.6, 1.6),
        phase: rand(0, Math.PI * 2),
        alpha: rand(0.18, 0.38) * intensity,
      };
    }

    function seed() {
      const r = scaleRect();
      const count = Math.floor(70 * intensity);
      particles = [];
      for (let i = 0; i < count; i++) {
        const p = spawn(r);
        p.life = rand(0, p.maxLife);
        particles.push(p);
      }
    }

    function drawSoft(p) {
      const fadeIn = Math.min(1, p.life / 0.5);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.1);
      const a = p.alpha * fadeIn * fadeOut;
      if (a < 0.02) return;

      const s = p.size;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, s);
      // Soft cool mist — readable on black shadow, not blown out on brick
      g.addColorStop(0, `rgba(255,255,255,${a * 0.85})`);
      g.addColorStop(0.35, `rgba(230,235,245,${a * 0.4})`);
      g.addColorStop(1, "rgba(200,210,220,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
      ctx.fill();
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - (frame.prev || now)) / 1000);
      frame.prev = now;
      t += dt;

      if (canvas.width < 2) {
        resize();
        seed();
      }

      ctx.clearRect(0, 0, cssW, cssH);
      const r = scaleRect();

      // Very soft pooled haze in the lip (helps sell depth without a blob)
      ctx.save();
      const hazeR = ctx.createLinearGradient(r.x + r.w, r.y, r.x + r.w + 90, r.y);
      hazeR.addColorStop(0, `rgba(255,255,255,${0.06 * intensity})`);
      hazeR.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = hazeR;
      ctx.fillRect(r.x + r.w - 8, r.y + r.h * 0.15, 100, r.h * 0.85);

      const hazeB = ctx.createLinearGradient(r.x, r.y + r.h, r.x, r.y + r.h + 80);
      hazeB.addColorStop(0, `rgba(255,255,255,${0.07 * intensity})`);
      hazeB.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = hazeB;
      ctx.fillRect(r.x, r.y + r.h - 10, r.w + 70, 90);
      ctx.restore();

      const target = Math.floor(80 * intensity);
      while (particles.length < target) particles.push(spawn(r));

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life += dt;
        p.x += p.vx + Math.sin(t * p.wobble + p.phase) * 0.22;
        p.y += p.vy;
        p.size = p.baseSize * (1 + p.life * 0.08);
        drawSoft(p);

        const dead =
          p.life >= p.maxLife ||
          p.y < r.y - 40 ||
          (p.x > r.x + 50 &&
            p.x < r.x + r.w - 50 &&
            p.y > r.y + 50 &&
            p.y < r.y + r.h - 50);

        if (dead) particles[i] = spawn(r);
      }

      // Keep the lens clean
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.fillStyle = "#000";
      roundFill(r.x + 3, r.y + 3, r.w - 6, r.h - 6, 8);
      ctx.restore();

      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", () => {
      resize();
      seed();
    });

    resize();
    seed();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
