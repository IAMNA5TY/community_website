<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cam Smoke</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    /**
     * Photographic smoke along cam edges (between drop shadow and webcam).
     * Layers: Brick → Drop shadow → THIS → Webcam
     *
     * https://na5ty.com/widgets/cam-smoke.html?obs=1&v=7
     * ?x=480&y=250&w=960&h=540&intensity=1.2
     */
    const params = new URLSearchParams(location.search);
    const BASE_W = 1920;
    const BASE_H = 1080;

    const cam = {
      x: num(params.get("x"), 480),
      y: num(params.get("y"), 250),
      w: num(params.get("w"), 960),
      h: num(params.get("h"), 540),
    };
    const intensity = clamp(num(params.get("intensity"), 1.25), 0.4, 2.5);

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });

    let cssW = BASE_W;
    let cssH = BASE_H;
    let plates = [];
    let layers = [];
    let t0 = performance.now();
    let ready = false;

    function num(v, fallback) {
      if (v == null || v === "") return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function resize() {
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      cssW = iw >= 2 ? iw : BASE_W;
      cssH = ih >= 2 ? ih : BASE_H;
      if (Math.abs(cssW - BASE_W) < 8 && Math.abs(cssH - BASE_H) < 8) {
        cssW = BASE_W;
        cssH = BASE_H;
      }
      canvas.width = cssW;
      canvas.height = cssH;
    }

    function scaleRect() {
      const sx = cssW / BASE_W;
      const sy = cssH / BASE_H;
      return {
        x: cam.x * sx,
        y: cam.y * sy,
        w: cam.w * sx,
        h: cam.h * sy,
      };
    }

    function roundFill(x, y, w, h, rad) {
      const rr = Math.min(rad, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
      ctx.fill();
    }

    function loadPlate(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("failed " + src));
        img.src = src + "?v=7";
      });
    }

    async function init() {
      plates = await Promise.all([
        loadPlate("/widgets/smoke/plate-a.png"),
        loadPlate("/widgets/smoke/plate-b.png"),
        loadPlate("/widgets/smoke/plate-c.png"),
      ]);

      // Visible but controlled — sits in the shadow lip around the cam
      layers = [
        { img: plates[0], side: "right",  scale: 0.78, alpha: 0.72, speed: 0.01,  phase: 0.0, bob: 12 },
        { img: plates[1], side: "bottom", scale: 0.9,  alpha: 0.62, speed: 0.008, phase: 1.4, bob: 9 },
        { img: plates[0], side: "bottom", scale: 0.7,  alpha: 0.45, speed: 0.013, phase: 2.8, bob: 14 },
        { img: plates[2], side: "right",  scale: 0.55, alpha: 0.4,  speed: 0.016, phase: 3.6, bob: 10 },
        { img: plates[1], side: "left",   scale: 0.5,  alpha: 0.35, speed: 0.011, phase: 5.0, bob: 8 },
      ];
      ready = true;
    }

    function layerRect(r, layer, now) {
      const drift = Math.sin(now * layer.speed + layer.phase);
      const bob = Math.cos(now * layer.speed * 0.9 + layer.phase) * layer.bob;
      const iw = layer.img.naturalWidth || 1;
      const ih = layer.img.naturalHeight || 1;
      const tw = r.w * layer.scale;
      const th = tw * (ih / iw);

      if (layer.side === "right") {
        return {
          x: r.x + r.w - tw * 0.35 + drift * 16,
          y: r.y + r.h * 0.08 + bob,
          w: tw,
          h: th,
        };
      }
      if (layer.side === "left") {
        return {
          x: r.x - tw * 0.68 + drift * 10,
          y: r.y + r.h * 0.22 + bob,
          w: tw * 0.95,
          h: th * 0.95,
        };
      }
      return {
        x: r.x + r.w * 0.02 + drift * 20,
        y: r.y + r.h - th * 0.5 + bob * 0.5,
        w: tw * 1.2,
        h: th,
      };
    }

    function frame(nowMs) {
      const now = (nowMs - t0) / 1000;
      if (canvas.width < 2 || canvas.height < 2) resize();
      ctx.clearRect(0, 0, cssW, cssH);

      if (!ready) {
        requestAnimationFrame(frame);
        return;
      }

      const r = scaleRect();

      for (const layer of layers) {
        const rect = layerRect(r, layer, now);
        const pulse = 0.88 + 0.12 * Math.sin(now * layer.speed * 1.8 + layer.phase);
        ctx.save();
        ctx.globalAlpha = clamp(layer.alpha * intensity * pulse, 0, 0.85);
        ctx.drawImage(layer.img, rect.x, rect.y, rect.w, rect.h);
        ctx.restore();
      }

      // Clear face area only — keep a solid edge band for the smoke lip
      const bleed = 2;
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.fillStyle = "#000";
      roundFill(r.x + bleed, r.y + bleed, r.w - bleed * 2, r.h - bleed * 2, 8);
      ctx.restore();

      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", resize);
    resize();
    init().catch((err) => console.error(err));
    requestAnimationFrame(frame);
  </script>
</body>
</html>
