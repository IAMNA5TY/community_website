<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cam Rim Light</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body.embed {
      background:
        repeating-linear-gradient(
          0deg,
          #d8d2ca 0px,
          #d8d2ca 18px,
          #cfc8bf 18px,
          #cfc8bf 19px
        );
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .demo-cam {
      display: none;
      position: absolute;
      border-radius: 8px;
      background: #1a1a1e;
      color: rgba(255,255,255,0.5);
      font: 700 13px/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
    }
    body.embed .demo-cam { display: flex; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="demo-cam" id="demoCam">Your webcam</div>
  <script>
    /**
     * Cinematic B&W rim light / light-leak peeking from behind the webcam.
     * Layers: Brick → Drop shadow → THIS → Webcam
     *
     * https://na5ty.com/widgets/cam-smoke.html?obs=1&v=12
     * ?x=480&y=250&w=960&h=540&intensity=1.1
     * Pure black & white only — no orange / color tint.
     */
    const params = new URLSearchParams(location.search);
    const BASE_W = 1920;
    const BASE_H = 1080;
    const embed = params.get("embed") === "1";
    if (embed) document.body.classList.add("embed");

    const cam = {
      x: num(params.get("x"), 480),
      y: num(params.get("y"), 250),
      w: num(params.get("w"), 960),
      h: num(params.get("h"), 540),
    };
    // Slightly stronger default glow than v10, still restrained
    const intensity = clamp(num(params.get("intensity"), 1.12), 0.35, 2);

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });
    const demoCam = document.getElementById("demoCam");

    let cssW = BASE_W;
    let cssH = BASE_H;
    let t = 0;
    let sparks = [];

    function num(v, fallback) {
      if (v == null || v === "") return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }
    function rand(a, b) {
      return a + Math.random() * (b - a);
    }
    function white(a) {
      // Pure white only (no warm/orange tint)
      return `rgba(255, 255, 255, ${a})`;
    }

    function resize() {
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      cssW = iw >= 2 ? iw : BASE_W;
      cssH = ih >= 2 ? ih : BASE_H;
      if (Math.abs(cssW - BASE_W) < 8 && Math.abs(cssH - BASE_H) < 8) {
        cssW = BASE_W;
        cssH = BASE_H;
      }
      canvas.width = cssW;
      canvas.height = cssH;
      const r = scaleRect();
      Object.assign(demoCam.style, {
        left: `${r.x}px`,
        top: `${r.y}px`,
        width: `${r.w}px`,
        height: `${r.h}px`,
      });
    }

    function scaleRect() {
      const sx = cssW / BASE_W;
      const sy = cssH / BASE_H;
      return {
        x: cam.x * sx,
        y: cam.y * sy,
        w: cam.w * sx,
        h: cam.h * sy,
      };
    }

    function roundPath(x, y, w, h, rad) {
      const rr = Math.min(rad, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function seedSparks(r) {
      sparks = [];
      const n = Math.floor(18 * intensity);
      for (let i = 0; i < n; i++) sparks.push(makeSpark(r, true));
    }

    function makeSpark(r, randomLife) {
      const side = Math.random();
      let x;
      let y;
      if (side < 0.55) {
        x = rand(r.x + r.w - 6, r.x + r.w + 55);
        y = rand(r.y + r.h * 0.15, r.y + r.h + 40);
      } else {
        x = rand(r.x + r.w * 0.15, r.x + r.w + 40);
        y = rand(r.y + r.h - 4, r.y + r.h + 50);
      }
      return {
        x,
        y,
        r: rand(1.2, 2.8),
        vx: rand(-0.05, 0.12),
        vy: rand(-0.35, -0.08),
        life: randomLife ? rand(0, 4) : 0,
        maxLife: rand(3.5, 6.5),
        twinkle: rand(2, 5),
        phase: rand(0, Math.PI * 2),
      };
    }

    function drawBloom(x, y, radius, color) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
      g.addColorStop(0, color);
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawRim(r, breath) {
      const ox = 26 + Math.sin(t * 0.35) * 6;
      const oy = 30 + Math.cos(t * 0.28) * 5;
      const k = intensity * breath;

      ctx.save();
      // Soft white key light behind bottom-right (B&W)
      drawBloom(
        r.x + r.w + ox * 0.2,
        r.y + r.h + oy * 0.15,
        Math.max(r.w, r.h) * 0.58,
        white(0.26 * k)
      );
      drawBloom(
        r.x + r.w + 8,
        r.y + r.h * 0.72,
        r.h * 0.45,
        white(0.32 * k)
      );
      drawBloom(
        r.x + r.w * 0.75,
        r.y + r.h + 10,
        r.w * 0.42,
        white(0.2 * k)
      );

      // Soft fill on the opposite edge for depth
      drawBloom(
        r.x - 10,
        r.y + r.h * 0.35,
        r.h * 0.4,
        white(0.12 * k)
      );

      // Thin bright white rim
      ctx.lineWidth = 3;
      ctx.strokeStyle = white(0.62 * k);
      ctx.shadowColor = white(0.7 * intensity);
      ctx.shadowBlur = 22 * intensity;
      roundPath(r.x - 1, r.y - 1, r.w + 2, r.h + 2, 10);
      ctx.stroke();

      // Softer outer halo — a little more glow, still restrained
      ctx.lineWidth = 12;
      ctx.strokeStyle = white(0.2 * k);
      ctx.shadowBlur = 34 * intensity;
      roundPath(r.x - 2, r.y - 2, r.w + 4, r.h + 4, 12);
      ctx.stroke();
      ctx.restore();
    }

    function drawSparks(r, dt) {
      const target = Math.floor(20 * intensity);
      while (sparks.length < target) sparks.push(makeSpark(r, false));

      for (let i = sparks.length - 1; i >= 0; i--) {
        const p = sparks[i];
        p.life += dt;
        p.x += p.vx + Math.sin(t * p.twinkle + p.phase) * 0.08;
        p.y += p.vy;

        const fadeIn = Math.min(1, p.life / 0.4);
        const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.2);
        const tw = 0.55 + 0.45 * Math.sin(t * p.twinkle + p.phase);
        const a = 0.55 * intensity * fadeIn * fadeOut * tw;
        if (a > 0.03) {
          drawBloom(p.x, p.y, p.r * 3.5, white(a * 0.85));
          ctx.fillStyle = white(a);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 0.55, 0, Math.PI * 2);
          ctx.fill();
        }

        if (p.life >= p.maxLife || p.y < r.y - 30) sparks[i] = makeSpark(r, false);
      }
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - (frame.prev || now)) / 1000);
      frame.prev = now;
      t += dt;

      if (canvas.width < 2) resize();
      ctx.clearRect(0, 0, cssW, cssH);

      const r = scaleRect();
      const breath = 0.82 + 0.18 * Math.sin(t * 0.9);

      drawRim(r, breath);
      drawSparks(r, dt);

      // Punch cam so light only peeks around / behind it
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.fillStyle = "#000";
      roundPath(r.x + 2, r.y + 2, r.w - 4, r.h - 4, 8);
      ctx.fill();
      ctx.restore();

      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", () => {
      resize();
      seedSparks(scaleRect());
    });

    resize();
    seedSparks(scaleRect());
    requestAnimationFrame(frame);
  </script>
</body>
</html>
