<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cam Smoke (texture)</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    /**
     * Soft photographic smoke plates drifting around the cam edge.
     * Layer order: Brick → Drop shadow → THIS → Webcam
     *
     * /widgets/cam-smoke.html?obs=1&v=6
     * ?x=480&y=250&w=960&h=540&intensity=1
     */
    const params = new URLSearchParams(location.search);
    const BASE_W = 1920;
    const BASE_H = 1080;

    const cam = {
      x: num(params.get("x"), 480),
      y: num(params.get("y"), 250),
      w: num(params.get("w"), 960),
      h: num(params.get("h"), 540),
    };
    // Keep this modest — plates already have detail
    const intensity = clamp(num(params.get("intensity"), 1), 0.35, 2);

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });

    let cssW = BASE_W;
    let cssH = BASE_H;
    let plates = [];
    let layers = [];
    let t0 = performance.now();
    let ready = false;

    function num(v, fallback) {
      if (v == null || v === "") return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function resize() {
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      cssW = iw >= 2 ? iw : BASE_W;
      cssH = ih >= 2 ? ih : BASE_H;
      if (Math.abs(cssW - BASE_W) < 8 && Math.abs(cssH - BASE_H) < 8) {
        cssW = BASE_W;
        cssH = BASE_H;
      }
      canvas.width = cssW;
      canvas.height = cssH;
    }

    function scaleRect() {
      const sx = cssW / BASE_W;
      const sy = cssH / BASE_H;
      return {
        x: cam.x * sx,
        y: cam.y * sy,
        w: cam.w * sx,
        h: cam.h * sy,
      };
    }

    function roundFill(x, y, w, h, rad) {
      const rr = Math.min(rad, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
      ctx.fill();
    }

    function loadPlate(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function init() {
      const urls = [
        "/widgets/smoke/plate-a.png",
        "/widgets/smoke/plate-b.png",
        "/widgets/smoke/plate-c.png",
      ];
      plates = await Promise.all(urls.map(loadPlate));

      // Soft edge layers: bottom lip + right side + light left — photographic drift
      layers = [
        { img: plates[0], side: "right",  scale: 0.62, alpha: 0.34, speed: 0.012, phase: 0.0,  bob: 10 },
        { img: plates[1], side: "bottom", scale: 0.72, alpha: 0.28, speed: 0.009, phase: 1.7,  bob: 8 },
        { img: plates[2], side: "right",  scale: 0.48, alpha: 0.22, speed: 0.015, phase: 3.1,  bob: 14 },
        { img: plates[0], side: "bottom", scale: 0.55, alpha: 0.18, speed: 0.007, phase: 4.4,  bob: 6 },
        { img: plates[1], side: "left",   scale: 0.42, alpha: 0.16, speed: 0.011, phase: 2.2,  bob: 9 },
      ];
      ready = true;
    }

    function layerRect(r, layer, now) {
      const drift = Math.sin(now * layer.speed + layer.phase);
      const bob = Math.cos(now * layer.speed * 0.85 + layer.phase) * layer.bob;
      const iw = layer.img.naturalWidth || layer.img.width;
      const ih = layer.img.naturalHeight || layer.img.height;
      const tw = r.w * layer.scale;
      const th = tw * (ih / iw);

      if (layer.side === "right") {
        return {
          x: r.x + r.w - tw * 0.28 + drift * 18,
          y: r.y + r.h * 0.12 + bob,
          w: tw,
          h: th,
        };
      }
      if (layer.side === "left") {
        return {
          x: r.x - tw * 0.72 + drift * 12,
          y: r.y + r.h * 0.25 + bob,
          w: tw * 0.9,
          h: th * 0.9,
        };
      }
      // bottom
      return {
        x: r.x + r.w * 0.08 + drift * 22,
        y: r.y + r.h - th * 0.45 + bob * 0.6,
        w: tw * 1.15,
        h: th,
      };
    }

    function drawEdgeMask(r) {
      // Soft band around cam — keeps smoke in the "between" zone
      const band = 110;
      const g = ctx.createRadialGradient(
        r.x + r.w * 0.55,
        r.y + r.h * 0.55,
        Math.min(r.w, r.h) * 0.35,
        r.x + r.w * 0.55,
        r.y + r.h * 0.55,
        Math.max(r.w, r.h) * 0.85
      );
      // Not used as fill — we punch hole after draw instead
      return band;
    }

    function frame(nowMs) {
      const now = (nowMs - t0) / 1000;
      if (canvas.width < 2 || canvas.height < 2) resize();

      ctx.clearRect(0, 0, cssW, cssH);
      if (!ready) {
        requestAnimationFrame(frame);
        return;
      }

      const r = scaleRect();
      drawEdgeMask(r);

      for (const layer of layers) {
        const rect = layerRect(r, layer, now);
        const pulse = 0.85 + 0.15 * Math.sin(now * layer.speed * 2 + layer.phase);
        ctx.save();
        ctx.globalAlpha = clamp(layer.alpha * intensity * pulse, 0, 0.55);
        ctx.drawImage(layer.img, rect.x, rect.y, rect.w, rect.h);
        ctx.restore();
      }

      // Hard clear over the cam face — smoke only peeks at edges
      const bleed = 6;
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.fillStyle = "#000";
      roundFill(r.x + bleed, r.y + bleed, r.w - bleed * 2, r.h - bleed * 2, 8);
      // Also fade far from cam so it doesn't flood the brick
      const fade = ctx.createRadialGradient(
        r.x + r.w * 0.6,
        r.y + r.h * 0.65,
        Math.min(r.w, r.h) * 0.55,
        r.x + r.w * 0.6,
        r.y + r.h * 0.65,
        Math.max(r.w, r.h) * 0.95
      );
      fade.addColorStop(0, "rgba(0,0,0,0)");
      fade.addColorStop(0.55, "rgba(0,0,0,0)");
      fade.addColorStop(1, "rgba(0,0,0,0.85)");
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, cssW, cssH);
      ctx.restore();

      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", resize);
    resize();
    init().catch((err) => console.error("smoke plates failed", err));
    requestAnimationFrame(frame);
  </script>
</body>
</html>
