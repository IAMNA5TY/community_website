<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cam Smoke (between shadow & cam)</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    /**
     * OBS Browser Source — smoke that peeks out from BETWEEN drop shadow and webcam.
     *
     * Layer order (bottom → top):
     *   1. Brick background
     *   2. Drop shadow
     *   3. THIS smoke
     *   4. Webcam (on top — covers the hole so face stays clear)
     *
     * URL: /widgets/cam-smoke.html?obs=1&v=4
     * Params (1920×1080): ?x=480&y=250&w=960&h=540&intensity=1.2
     */
    const params = new URLSearchParams(location.search);
    const BASE_W = 1920;
    const BASE_H = 1080;

    const cam = {
      x: num(params.get("x"), 480),
      y: num(params.get("y"), 250),
      w: num(params.get("w"), 960),
      h: num(params.get("h"), 540),
    };
    const intensity = clamp(num(params.get("intensity"), 1.2), 0.35, 2.5);

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });

    let cssW = BASE_W;
    let cssH = BASE_H;
    let particles = [];
    let t = 0;

    function num(v, fallback) {
      if (v == null || v === "") return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }
    function rand(a, b) {
      return a + Math.random() * (b - a);
    }

    function resize() {
      // Lock to 1920×1080 in OBS so cam hole stays aligned
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      cssW = iw >= 2 ? iw : BASE_W;
      cssH = ih >= 2 ? ih : BASE_H;
      // Prefer design space when OBS is set to 1920×1080
      if (Math.abs(cssW - BASE_W) < 8 && Math.abs(cssH - BASE_H) < 8) {
        cssW = BASE_W;
        cssH = BASE_H;
      }
      canvas.width = cssW;
      canvas.height = cssH;
    }

    function scaleRect() {
      const sx = cssW / BASE_W;
      const sy = cssH / BASE_H;
      return {
        x: cam.x * sx,
        y: cam.y * sy,
        w: cam.w * sx,
        h: cam.h * sy,
      };
    }

    function roundFill(x, y, w, h, rad) {
      const rr = Math.min(rad, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
      ctx.fill();
    }

    /** Spawn ONLY outside the cam — sides + bottom lip (between shadow & cam). */
    function spawn(r) {
      const lip = 70;
      const roll = Math.random();
      let x;
      let y;

      if (roll < 0.42) {
        // bottom lip (over the drop shadow)
        x = rand(r.x - 10, r.x + r.w + 10);
        y = rand(r.y + r.h - 8, r.y + r.h + lip);
      } else if (roll < 0.72) {
        // right side (main peek with bottom-right shadow)
        x = rand(r.x + r.w - 6, r.x + r.w + lip);
        y = rand(r.y + r.h * 0.15, r.y + r.h + lip * 0.7);
      } else if (roll < 0.92) {
        // left side
        x = rand(r.x - lip, r.x + 6);
        y = rand(r.y + r.h * 0.2, r.y + r.h + lip * 0.55);
      } else {
        // top edge, light
        x = rand(r.x + 20, r.x + r.w - 20);
        y = rand(r.y - lip * 0.45, r.y + 4);
      }

      const size = rand(55, 140) * (0.85 + intensity * 0.3);
      return {
        x,
        y,
        vx: rand(-0.15, 0.2),
        vy: rand(-0.45, -0.12),
        size,
        life: 0,
        maxLife: rand(2.8, 5.5),
        spin: rand(-0.2, 0.2),
        rot: rand(0, Math.PI * 2),
        alpha: rand(0.22, 0.48) * intensity,
      };
    }

    function seed() {
      const r = scaleRect();
      particles = [];
      const count = Math.floor(36 * intensity);
      for (let i = 0; i < count; i++) {
        const p = spawn(r);
        p.life = rand(0, p.maxLife * 0.8);
        particles.push(p);
      }
    }

    function drawParticle(p) {
      const fadeIn = Math.min(1, p.life / 0.55);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.2);
      const a = p.alpha * fadeIn * fadeOut;
      if (a <= 0.02) return;

      const g = ctx.createRadialGradient(0, 0, p.size * 0.06, 0, 0, p.size * 0.55);
      g.addColorStop(0, `rgba(220, 228, 236, ${a})`);
      g.addColorStop(0.4, `rgba(165, 175, 190, ${a * 0.6})`);
      g.addColorStop(1, "rgba(120, 130, 145, 0)");

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.scale(1.35, 0.8);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, p.size * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function punchCamHole(r) {
      // OBS CEF often ignores clip("evenodd") — punch after draw instead.
      // Leave a tiny outer bleed so smoke can tuck under the cam edge.
      const bleed = 4;
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.fillStyle = "#000";
      roundFill(r.x + bleed, r.y + bleed, r.w - bleed * 2, r.h - bleed * 2, 8);
      ctx.restore();
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - (frame.prev || now)) / 1000);
      frame.prev = now;
      t += dt;

      if (canvas.width < 2 || canvas.height < 2) {
        resize();
        seed();
      }

      ctx.clearRect(0, 0, cssW, cssH);
      const r = scaleRect();

      // Soft haze only along the bottom/right lip (between shadow & cam)
      const haze = ctx.createLinearGradient(r.x, r.y + r.h - 20, r.x, r.y + r.h + 90);
      haze.addColorStop(0, "rgba(160,170,185,0)");
      haze.addColorStop(0.45, `rgba(150,160,175,${0.16 * intensity})`);
      haze.addColorStop(1, "rgba(120,130,145,0)");
      ctx.fillStyle = haze;
      ctx.fillRect(r.x - 40, r.y + r.h - 30, r.w + 120, 130);

      const target = Math.floor(40 * intensity);
      while (particles.length < target) particles.push(spawn(r));

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life += dt;
        p.rot += p.spin * dt;
        p.x += p.vx + Math.sin(t * 0.8 + p.y * 0.012) * 0.12;
        p.y += p.vy;
        p.size *= 1 + dt * 0.035;
        drawParticle(p);

        // Kill anything that drifts deep into the cam face area
        const deepInCam =
          p.x > r.x + 40 &&
          p.x < r.x + r.w - 40 &&
          p.y > r.y + 40 &&
          p.y < r.y + r.h - 40;

        if (p.life >= p.maxLife || p.y < r.y - 120 || deepInCam) {
          particles[i] = spawn(r);
        }
      }

      punchCamHole(r);
      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", () => {
      resize();
      seed();
    });

    resize();
    seed();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
