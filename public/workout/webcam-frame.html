<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workout Webcam Frame</title>
  <link rel="stylesheet" href="css/workout-theme.css">
  <style>
    body { background: transparent !important; }

    .frame-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .webcam-frame {
      position: relative;
      width: 640px;
      height: 360px;
    }

    .frame-inner {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <div class="webcam-frame">
      <div class="webcam-border"></div>
      <div class="frame-inner"></div>
      <div class="live-tag"><span class="live-dot"></span> LIVE</div>
      <div class="frame-badge">1 SUB = 1 MIN 🏃</div>
    </div>
  </div>
</body>
</html>
