<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rules Banner</title>
  <link rel="stylesheet" href="css/workout-theme.css">
  <link rel="stylesheet" href="../widgets/css/widgets-theme.css?v=10">
  <style>
    body { background: transparent !important; }

    .wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
    }

    .wrap .stream-alert-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="rules-banner" id="staticRulesBanner">
      <div class="rules-item"><span class="num">1</span> SUB</div>
      <div class="rules-arrow orange">→</div>
      <div class="rules-item blue"><span class="num">1</span> MIN TREADMILL</div>
      <div class="rules-arrow">→</div>
      <div class="rules-item">💪 LET'S GO</div>
    </div>
    <div class="rules-banner stream-alert-banner" id="alertBanner">
      <div class="stream-alert-track" id="alertTrack"></div>
    </div>
  </div>

  <script src="../widgets/js/stream-alerts.js?v=10"></script>
  <script>
    initStreamAlerts({ displayMs: 5500 });
  </script>
</body>
</html>
