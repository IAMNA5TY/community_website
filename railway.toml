# Railway: mount a persistent volume at /data and set DATA_DIR=/data
# so workout minutes, partners, and tokens survive deploys.
[build]
builder = "NIXPACKS"

[deploy]
# ALWAYS — never leave the site dead after a few crashes (ON_FAILURE + max 5 did that).
restartPolicyType = "ALWAYS"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
